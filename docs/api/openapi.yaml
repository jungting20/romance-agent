        id:
          $ref: "#/components/schemas/ManuscriptId"
        projectId:
          $ref: "#/components/schemas/ProjectId"
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/Scene"
        activeSceneId:
          $ref: "#/components/schemas/SceneId"
    ProjectWorkspace:
      type: object
      additionalProperties: false
      required: [project, concept, storyBible, manuscript, manuscriptRevision]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        concept:
          $ref: "#/components/schemas/StoryConcept"
        storyBible:
          $ref: "#/components/schemas/StoryBible"
        manuscript:
          $ref: "#/components/schemas/Manuscript"
        manuscriptRevision:
          type: integer
          minimum: 1
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [title, logline, tropeId, protagonistNames]
      properties:
        title:
          type: string
        logline:
          type: string
        tropeId:
          $ref: "#/components/schemas/TropeId"
        protagonistNames:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
    ProjectListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
    SaveManuscriptRequest:
