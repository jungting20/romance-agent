openapi: 3.1.0
info:
  title: Romance Agent API
  version: 0.1.0
  description: 로맨스 작품 프로젝트 작업공간을 생성하고 불러오며 원고를 저장하는 API입니다.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api
security: []
tags:
  - name: Health
    description: API 프로세스 가용성 확인
  - name: Projects
    description: 프로젝트 서재와 원자적 작업공간 생성 및 조회
  - name: Story Bible
    description: 프로젝트의 인물 및 세계관 기준 정보 조회와 세계관 항목 저장
  - name: Manuscripts
    description: 리비전 충돌을 방지하는 원고 저장과 장면 초안 비교
paths:
  /health:
    get:
      servers:
        - url: /
      tags: [Health]
      operationId: getHealth
      summary: API 프로세스 상태 확인
      description: 외부 시스템 의존성 검사 없이 API 프로세스가 요청을 처리할 수 있음을 반환합니다.
      responses:
        "200":
          description: API 프로세스가 요청을 처리할 수 있음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: 최근 프로젝트 목록 조회
      description: Projects가 소유하는 서재 메타데이터를 최근 활동 시각 내림차순으로 반환합니다.
      responses:
        "200":
          description: 최근 활동 순서로 정렬한 프로젝트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
              example:
                items:
                  - id: silver-garden
                    title: 은빛 정원의 약속
                    logline: 오해로 헤어진 두 사람이 오래된 온실에서 다시 만난다.
                    tropeId: reunion
                    updatedAt: "2026-07-13T05:00:00.000Z"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Projects]
      operationId: createProjectWorkspace
      summary: 프로젝트 작업공간 생성
      description: 사용자 입력을 검증한 뒤 Project, Story Concept, Story Bible, 초기 Manuscript를 원자적으로 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              title: 빗속의 재회
              logline: 헤어진 두 사람이 비 내리는 서점에서 다시 만난다.
              tropeId: reunion
              protagonistNames: [하린, 태오]
      responses:
        "201":
          description: 생성된 전체 프로젝트 작업공간
          headers:
            Location:
              required: true
              description: 생성된 프로젝트 작업공간을 조회하는 경로
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWorkspace"
              example:
                project:
                  id: rain-bookstore
                  title: 빗속의 재회
                  logline: 헤어진 두 사람이 비 내리는 서점에서 다시 만난다.
                  tropeId: reunion
                  updatedAt: "2026-07-14T03:00:00.000Z"
                concept:
                  id: rain-bookstore-concept
                  projectId: rain-bookstore
                  tropeId: reunion
                  logline: 헤어진 두 사람이 비 내리는 서점에서 다시 만난다.
                  protagonistNames: [하린, 태오]
                storyBible:
                  projectId: rain-bookstore
                  characters:
                    - id: rain-bookstore-character-1
                      name: 하린
                      role: protagonist
                      desire: 자신의 선택을 지키고 싶다.
                      hiddenFeeling: 상대의 진심을 확인하고 싶다.
                    - id: rain-bookstore-character-2
                      name: 태오
                      role: protagonist
                      desire: 과거의 오해를 풀고 싶다.
                      hiddenFeeling: 이번에는 먼저 놓치고 싶지 않다.
                  worldEntries:
                    - id: rain-bookstore-world-1
                      kind: place
                      title: 비 내리는 서점
                      description: 두 사람이 다시 만난 오래된 서점이다.
                manuscript:
                  id: rain-bookstore-manuscript
                  projectId: rain-bookstore
                  scenes:
                    - id: rain-bookstore-scene-1
                      title: 다시 마주친 날
                      chapterNumber: 1
                      content: 창밖으로 비가 내렸다.
                      relatedCharacterIds:
                        - rain-bookstore-character-1
                        - rain-bookstore-character-2
                      relatedWorldEntryIds: [rain-bookstore-world-1]
                  activeSceneId: rain-bookstore-scene-1
                manuscriptRevision: 1
        "400":
          $ref: "#/components/responses/MalformedRequest"
        "422":
          description: >-
            필드는 모두 존재하고 JSON 타입도 올바르지만 제목이 공백이거나, 트로프 문자열이 등록된 값이 아니거나,
            주인공 이름 배열의 항목 수가 정확히 두 개가 아니거나 공백 이름을 포함해 도메인 규칙을 위반함.
            서버는 TropeId enum 및 protagonistNames minItems/maxItems 위반 중 이 범주를 422로 매핑해야 합니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalidTitle:
                  summary: 공백 제목
                  value:
                    code: INVALID_TITLE
                    message: 작품 제목을 입력해 주세요.
                    fieldErrors:
                      - path: title
                        message: 작품 제목을 입력해 주세요.
                invalidTrope:
                  summary: 등록되지 않은 트로프
                  value:
                    code: INVALID_TROPE
                    message: 선택한 로맨스 트로프를 찾을 수 없습니다.
                    fieldErrors:
                      - path: tropeId
                        message: 등록된 로맨스 트로프를 선택해 주세요.
                invalidProtagonists:
                  summary: 주인공 수 또는 이름 오류
                  value:
                    code: INVALID_PROTAGONISTS
                    message: 두 주인공의 이름을 모두 입력해 주세요.
                    fieldErrors:
                      - path: protagonistNames
                        message: 두 주인공의 이름을 모두 입력해 주세요.
        "500":
          $ref: "#/components/responses/InternalError"
  /projects/{projectId}/workspace:
    get:
      tags: [Projects]
      operationId: getProjectWorkspace
      summary: 프로젝트 작업공간 조회
      description: 프로젝트에 속한 Story Concept, Story Bible, Manuscript와 현재 원고 리비전을 함께 반환합니다.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      responses:
        "200":
          description: 프로젝트의 전체 작업공간
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWorkspace"
              example:
                project:
                  id: silver-garden
                  title: 은빛 정원의 약속
                  logline: 오해로 헤어진 두 사람이 오래된 온실에서 다시 만난다.
                  tropeId: reunion
                  updatedAt: "2026-07-13T05:00:00.000Z"
                concept:
                  id: silver-garden-concept
                  projectId: silver-garden
                  tropeId: reunion
                  logline: 오해로 헤어진 두 사람이 오래된 온실에서 다시 만난다.
                  protagonistNames: [서윤, 도현]
                storyBible:
                  projectId: silver-garden
                  characters:
                    - id: silver-garden-character-1
                      name: 서윤
                      role: protagonist
                      desire: 상대에게 흔들리지 않고 자신의 선택을 지키고 싶다.
                      hiddenFeeling: 여전히 상대의 진심을 확인하고 싶다.
                    - id: silver-garden-character-2
                      name: 도현
                      role: protagonist
                      desire: 과거의 오해를 풀고 다시 신뢰받고 싶다.
                      hiddenFeeling: 이번에는 먼저 놓치고 싶지 않다.
                  worldEntries:
                    - id: silver-garden-world-1
                      kind: place
                      title: 비가 그친 온실
                      description: 두 사람이 과거에 마지막으로 만났던 장소다.
                manuscript:
                  id: silver-garden-manuscript
                  projectId: silver-garden
                  scenes:
                    - id: silver-garden-scene-1
                      title: 비가 그친 뒤의 정원
                      chapterNumber: 1
                      content: 비가 그친 뒤의 온실은 오래된 비밀처럼 고요했다.
                      relatedCharacterIds:
                        - silver-garden-character-1
                        - silver-garden-character-2
                      relatedWorldEntryIds: [silver-garden-world-1]
                  activeSceneId: silver-garden-scene-1
                manuscriptRevision: 1
        "404":
          $ref: "#/components/responses/ProjectNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /projects/{projectId}/story-bible:
    get:
      tags: [Story Bible]
      operationId: getStoryBible
      summary: 스토리 바이블 조회
      description: >-
        프로젝트에 속한 현재 Story Bible과 세계관 항목 저장에 사용할 리비전을 함께 반환합니다.
        리비전은 성공한 세계관 항목 저장마다 정확히 한 번 증가합니다.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      responses:
        "200":
          description: 프로젝트의 현재 Story Bible과 리비전
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryBibleSnapshot"
              example:
                storyBible:
                  projectId: silver-garden
                  characters:
                    - id: silver-garden-character-1
                      name: 서윤
                      role: protagonist
                      desire: 상대에게 흔들리지 않고 자신의 선택을 지키고 싶다.
                      hiddenFeeling: 여전히 상대의 진심을 확인하고 싶다.
                    - id: silver-garden-character-2
                      name: 도현
                      role: protagonist
                      desire: 과거의 오해를 풀고 다시 신뢰받고 싶다.
                      hiddenFeeling: 이번에는 먼저 놓치고 싶지 않다.
                  worldEntries:
                    - id: silver-garden-world-1
                      kind: place
                      title: 비가 그친 온실
                      description: 두 사람이 과거에 마지막으로 만났던 장소다.
                storyBibleRevision: 1
        "404":
          $ref: "#/components/responses/StoryBibleNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /projects/{projectId}/story-bible/world-entries:
    put:
      tags: [Story Bible]
      operationId: saveWorldEntries
      summary: 세계관 항목 수정 및 추가
      description: >-
        기대 리비전과 기존 항목 수정 목록 및 새 항목 추가 목록을 하나의 명령으로 검증하고 원자적으로 저장합니다.
        expectedRevision은 현재 storyBibleRevision과 정확히 일치해야 하며, 현재 값보다 낮거나 높은 모든 불일치는
        아무 항목도 변경하지 않고 STORY_BIBLE_REVISION_CONFLICT로 거부합니다.
        수정 목록에서 생략한 기존 세계관 항목과 모든 인물은 그대로 유지하며 삭제 또는 순서 변경을 수행하지 않습니다.
        기존 항목 식별자는 유지하고 추가 항목에는 프로젝트 안에서 고유한 식별자를 생성합니다. 제목과 설명은 앞뒤
        공백을 제거한 값으로 저장합니다. 명령 전체가 유효할 때만 한 번 저장하고 리비전을 정확히 한 번 증가시키며,
        부분 성공, 자동 병합, 강제 저장은 지원하지 않습니다. 같은 추가 명령을 이전 expectedRevision으로 반복하면
        리비전 충돌로 거부되어 추가 항목이 중복 생성되지 않습니다.
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveWorldEntriesRequest"
            example:
              expectedRevision: 1
              updates:
                - id: silver-garden-world-1
                  kind: place
                  title: 비가 그친 유리 온실
                  description: 두 사람이 과거에 마지막으로 만났던 장소다.
              additions:
                - kind: rule
                  title: 왕실의 서약
                  description: 서약을 어기면 계승권을 잃는다.
      responses:
        "200":
          description: 모든 변경을 반영한 권위 있는 Story Bible과 한 번 증가한 리비전
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryBibleSnapshot"
              example:
                storyBible:
                  projectId: silver-garden
                  characters:
                    - id: silver-garden-character-1
                      name: 서윤
                      role: protagonist
                      desire: 상대에게 흔들리지 않고 자신의 선택을 지키고 싶다.
                      hiddenFeeling: 여전히 상대의 진심을 확인하고 싶다.
                    - id: silver-garden-character-2
                      name: 도현
                      role: protagonist
                      desire: 과거의 오해를 풀고 다시 신뢰받고 싶다.
                      hiddenFeeling: 이번에는 먼저 놓치고 싶지 않다.
                  worldEntries:
                    - id: silver-garden-world-1
                      kind: place
                      title: 비가 그친 유리 온실
                      description: 두 사람이 과거에 마지막으로 만났던 장소다.
                    - id: silver-garden-world-2
                      kind: rule
                      title: 왕실의 서약
                      description: 서약을 어기면 계승권을 잃는다.
                storyBibleRevision: 2
        "400":
          $ref: "#/components/responses/MalformedRequest"
        "404":
          $ref: "#/components/responses/StoryBibleNotFound"
        "409":
          $ref: "#/components/responses/StoryBibleRevisionConflict"
        "422":
          $ref: "#/components/responses/InvalidWorldEntries"
        "500":
          $ref: "#/components/responses/InternalError"
  /manuscripts/{manuscriptId}:
    put:
      tags: [Manuscripts]
      operationId: saveManuscript
      summary: 전체 원고 저장
      description: Manuscript 전체 표현을 기대 리비전과 함께 검증하여 저장하고 프로젝트 최근 활동 시각을 같은 트랜잭션에서 갱신합니다.
      parameters:
        - $ref: "#/components/parameters/ManuscriptIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveManuscriptRequest"
            example:
              manuscript:
                id: silver-garden-manuscript
                projectId: silver-garden
                scenes:
                  - id: silver-garden-scene-1
                    title: 비가 그친 뒤의 정원
                    chapterNumber: 1
                    content: 서윤은 오래된 온실 문을 천천히 열었다.
                    relatedCharacterIds:
                      - silver-garden-character-1
                      - silver-garden-character-2
                    relatedWorldEntryIds: [silver-garden-world-1]
                activeSceneId: silver-garden-scene-1
              expectedRevision: 1
      responses:
        "200":
          description: 저장된 원고와 새 리비전 및 프로젝트 활동 시각
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveManuscriptResponse"
              example:
                manuscript:
                  id: silver-garden-manuscript
                  projectId: silver-garden
                  scenes:
                    - id: silver-garden-scene-1
                      title: 비가 그친 뒤의 정원
                      chapterNumber: 1
                      content: 서윤은 오래된 온실 문을 천천히 열었다.
                      relatedCharacterIds:
                        - silver-garden-character-1
                        - silver-garden-character-2
                      relatedWorldEntryIds: [silver-garden-world-1]
                  activeSceneId: silver-garden-scene-1
                manuscriptRevision: 2
                projectActivity:
                  projectId: silver-garden
                  updatedAt: "2026-07-14T03:00:00.000Z"
        "400":
          $ref: "#/components/responses/MalformedRequest"
        "404":
          $ref: "#/components/responses/ManuscriptNotFound"
        "409":
          $ref: "#/components/responses/ManuscriptRevisionConflict"
        "422":
          $ref: "#/components/responses/InvalidManuscript"
        "500":
          $ref: "#/components/responses/InternalError"
  /manuscripts/{manuscriptId}/scene-diffs:
    post:
      tags: [Manuscripts]
      operationId: compareManuscriptScene
      summary: 장면 초안 비교
      description: >-
        경로의 원고에 속한 장면의 로컬 초안과 현재 서버 초안을 줄 단위로 정렬해 반환합니다.
        비교는 원고, 서버 장면 및 제출한 로컬 내용을 변경하지 않습니다.
      parameters:
        - $ref: "#/components/parameters/ManuscriptIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareManuscriptSceneRequest"
            example:
              sceneId: silver-garden-scene-1
              localContent: |-
                첫째 줄
                로컬 줄
      responses:
        "200":
          description: 현재 서버 리비전과 원고 전체 표현을 포함한 줄 단위 장면 비교 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareManuscriptSceneResponse"
              example:
                sceneId: silver-garden-scene-1
                serverRevision: 2
                localContent: |-
                  첫째 줄
                  로컬 줄
                serverContent: |-
                  첫째 줄
                  서버 줄
                serverManuscript:
                  id: silver-garden-manuscript
                  projectId: silver-garden
                  scenes:
                    - id: silver-garden-scene-1
                      title: 비가 그친 뒤의 정원
                      chapterNumber: 1
                      content: |-
                        첫째 줄
                        서버 줄
                      relatedCharacterIds:
                        - silver-garden-character-1
                        - silver-garden-character-2
                      relatedWorldEntryIds: [silver-garden-world-1]
                  activeSceneId: silver-garden-scene-1
                rows:
                  - kind: unchanged
                    localLineNumber: 1
                    localText: 첫째 줄
                    serverLineNumber: 1
                    serverText: 첫째 줄
                  - kind: local-only
                    localLineNumber: 2
                    localText: 로컬 줄
                    serverLineNumber: null
                    serverText: null
                  - kind: server-only
                    localLineNumber: null
                    localText: null
                    serverLineNumber: 2
                    serverText: 서버 줄
        "400":
          $ref: "#/components/responses/MalformedRequest"
        "404":
          $ref: "#/components/responses/ManuscriptOrSceneNotFound"
        "422":
          $ref: "#/components/responses/InvalidSceneReference"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  parameters:
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      description: 조회할 프로젝트 식별자
      schema:
        $ref: "#/components/schemas/ProjectId"
      example: silver-garden
    ManuscriptIdPath:
      name: manuscriptId
      in: path
      required: true
      description: 작업 대상 원고 식별자
      schema:
        $ref: "#/components/schemas/ManuscriptId"
      example: silver-garden-manuscript
  responses:
    MalformedRequest:
      description: >-
        JSON 구문이 잘못되었거나, 필수 필드가 없거나, JSON 값 타입이 스키마와 다르거나,
        요청 루트 또는 중첩된 Manuscript, Scene, 세계관 수정 및 추가 객체에 선언되지 않은 속성이 있음.
        빈 식별자, 잘못된 enum 문자열, 잘못된 정수 및 배열 항목 타입을 포함한 그 밖의 요청 스키마 위반도
        400으로 매핑합니다.
        단, POST /projects의 타입이 올바른 미등록 트로프 문자열과 protagonistNames 항목 수 위반은 422로 매핑합니다.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: MALFORMED_REQUEST
            message: 요청 형식을 확인해 주세요.
            fieldErrors: []
    ProjectNotFound:
      description: 프로젝트를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: PROJECT_NOT_FOUND
            message: 프로젝트를 찾을 수 없습니다.
            fieldErrors: []
    ManuscriptNotFound:
      description: 원고를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: MANUSCRIPT_NOT_FOUND
            message: 원고를 찾을 수 없습니다.
            fieldErrors: []
    StoryBibleNotFound:
      description: 프로젝트에 속한 Story Bible을 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: STORY_BIBLE_NOT_FOUND
            message: 세계관 정보를 찾을 수 없습니다.
            fieldErrors: []
    ManuscriptOrSceneNotFound:
      description: 경로의 원고 또는 요청한 장면을 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            manuscriptNotFound:
              summary: 원고를 찾을 수 없음
              value:
                code: MANUSCRIPT_NOT_FOUND
                message: 원고를 찾을 수 없습니다.
                fieldErrors: []
            sceneNotFound:
              summary: 장면을 찾을 수 없음
              value:
                code: SCENE_NOT_FOUND
                message: 장면을 찾을 수 없습니다.
                fieldErrors: []
    InvalidSceneReference:
      description: 요청한 장면이 존재하지만 경로의 원고에 속하지 않아 식별 관계가 일치하지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: INVALID_SCENE_REFERENCE
            message: 장면이 원고에 속하지 않습니다.
            fieldErrors:
              - path: sceneId
                message: 경로의 원고에 속한 장면을 선택해 주세요.
    ManuscriptRevisionConflict:
      description: 기대 리비전보다 저장된 원고 리비전이 앞서 있음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: MANUSCRIPT_REVISION_CONFLICT
            message: 다른 위치에서 원고가 먼저 수정되었습니다.
            fieldErrors: []
    StoryBibleRevisionConflict:
      description: >-
        expectedRevision이 현재 storyBibleRevision과 일치하지 않아 아무 항목도 변경하지 않음.
        expectedRevision이 현재 값보다 낮거나 높은 경우 모두 이 충돌로 처리함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: STORY_BIBLE_REVISION_CONFLICT
            message: 다른 위치에서 세계관이 먼저 수정되었습니다.
            fieldErrors: []
    InvalidWorldEntries:
      description: >-
        JSON 타입과 객체 구조는 올바르지만 수정과 추가 목록이 모두 비었거나, 앞뒤 공백을 제거한 제목 또는 설명이
        비었거나, 수정 식별자가 중복되었거나 현재 Story Bible에 존재하지 않아 명령 전체를 적용하지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            emptyCommand:
              summary: 수정과 추가가 모두 비어 있음
              value:
                code: INVALID_WORLD_ENTRIES
                message: 수정하거나 추가할 세계관 항목이 필요합니다.
                fieldErrors:
                  - path: updates
                    message: 수정 또는 추가 항목을 한 개 이상 입력해 주세요.
                  - path: additions
                    message: 수정 또는 추가 항목을 한 개 이상 입력해 주세요.
            blankFields:
              summary: 정규화 뒤 제목과 설명이 비어 있음
              value:
                code: INVALID_WORLD_ENTRIES
                message: 세계관 항목을 확인해 주세요.
                fieldErrors:
                  - path: updates[0].title
                    message: 제목을 입력해 주세요.
                  - path: additions[0].description
                    message: 설명을 입력해 주세요.
            duplicateUpdateIds:
              summary: 동일한 기존 항목을 두 번 수정함
              value:
                code: INVALID_WORLD_ENTRIES
                message: 같은 세계관 항목을 두 번 수정할 수 없습니다.
                fieldErrors:
                  - path: updates[1].id
                    message: 수정 항목 식별자가 중복되었습니다.
            unknownUpdateId:
              summary: 현재 Story Bible에 없는 항목을 수정함
              value:
                code: INVALID_WORLD_ENTRIES
                message: 수정할 세계관 항목을 찾을 수 없습니다.
                fieldErrors:
                  - path: updates[0].id
                    message: 현재 세계관에 존재하는 항목을 선택해 주세요.
    InvalidManuscript:
      description: >-
        필드는 모두 존재하고 JSON 타입 및 객체 구조도 올바르지만 경로와 본문의 원고 식별자가 다르거나,
        원고의 프로젝트 관계가 다르거나, activeSceneId가 scenes에 존재하지 않아 도메인 규칙을 위반함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            identifierMismatch:
              summary: 경로와 본문의 원고 식별자 불일치
              value:
                code: INVALID_MANUSCRIPT
                message: 원고 정보를 확인해 주세요.
                fieldErrors:
                  - path: manuscript.id
                    message: 경로의 원고 식별자와 일치해야 합니다.
            missingActiveScene:
              summary: 활성 장면 참조 오류
              value:
                code: INVALID_MANUSCRIPT
                message: 원고 정보를 확인해 주세요.
                fieldErrors:
                  - path: manuscript.activeSceneId
                    message: 원고에 존재하는 장면을 선택해 주세요.
    InternalError:
      description: 요청을 처리하는 중 예상하지 못한 오류가 발생함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: INTERNAL_ERROR
            message: 잠시 후 다시 시도해 주세요.
            fieldErrors: []
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          description: API 프로세스 가용 상태
    ProjectId:
      type: string
      minLength: 1
      description: 프로젝트 고유 식별자
      examples: [silver-garden]
    ConceptId:
      type: string
      minLength: 1
      description: 이야기 콘셉트 고유 식별자
      examples: [silver-garden-concept]
    ManuscriptId:
      type: string
      minLength: 1
      description: 원고 고유 식별자
      examples: [silver-garden-manuscript]
    SceneId:
      type: string
      minLength: 1
      description: 장면 고유 식별자
      examples: [silver-garden-scene-1]
    CharacterId:
      type: string
      minLength: 1
      description: 인물 고유 식별자
      examples: [silver-garden-character-1]
    WorldEntryId:
      type: string
      minLength: 1
      description: 세계관 항목 고유 식별자
      examples: [silver-garden-world-1]
    TropeId:
      type: string
      enum: [rivals-to-lovers, contract-romance, reunion, friends-to-lovers]
      description: Story Design에 등록된 로맨스 트로프 식별자
    WorldEntryKind:
      type: string
      enum: [place, object, rule]
      description: 세계관 항목의 분류
    CharacterRole:
      type: string
      enum: [protagonist]
      description: 초기 스토리 바이블 인물의 역할
    Project:
      type: object
      additionalProperties: false
      required: [id, title, logline, tropeId, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/ProjectId"
        title:
          type: string
          minLength: 1
        logline:
          type: string
        tropeId:
          $ref: "#/components/schemas/TropeId"
        updatedAt:
          $ref: "#/components/schemas/UtcDateTime"
    StoryConcept:
      type: object
      additionalProperties: false
      required: [id, projectId, tropeId, logline, protagonistNames]
      properties:
        id:
          $ref: "#/components/schemas/ConceptId"
        projectId:
          $ref: "#/components/schemas/ProjectId"
        tropeId:
          $ref: "#/components/schemas/TropeId"
        logline:
          type: string
        protagonistNames:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
            minLength: 1
    Character:
      type: object
      additionalProperties: false
      required: [id, name, role, desire, hiddenFeeling]
      properties:
        id:
          $ref: "#/components/schemas/CharacterId"
        name:
          type: string
          minLength: 1
        role:
          $ref: "#/components/schemas/CharacterRole"
        desire:
          type: string
        hiddenFeeling:
          type: string
    WorldEntry:
      type: object
      additionalProperties: false
      required: [id, kind, title, description]
      properties:
        id:
          $ref: "#/components/schemas/WorldEntryId"
        kind:
          $ref: "#/components/schemas/WorldEntryKind"
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
    StoryBible:
      type: object
      additionalProperties: false
      required: [projectId, characters, worldEntries]
      properties:
        projectId:
          $ref: "#/components/schemas/ProjectId"
        characters:
          type: array
          items:
            $ref: "#/components/schemas/Character"
        worldEntries:
          type: array
          items:
            $ref: "#/components/schemas/WorldEntry"
    StoryBibleSnapshot:
      type: object
      additionalProperties: false
      required: [storyBible, storyBibleRevision]
      properties:
        storyBible:
          $ref: "#/components/schemas/StoryBible"
        storyBibleRevision:
          type: integer
          minimum: 1
          description: 현재 Story Bible 리비전
    WorldEntryUpdate:
      type: object
      additionalProperties: false
      required: [id, kind, title, description]
      properties:
        id:
          $ref: "#/components/schemas/WorldEntryId"
        kind:
          $ref: "#/components/schemas/WorldEntryKind"
        title:
          type: string
          description: 앞뒤 공백 제거 후 비어 있지 않아야 하는 세계관 항목 제목
        description:
          type: string
          description: 앞뒤 공백 제거 후 비어 있지 않아야 하는 세계관 항목 설명
    WorldEntryAddition:
      type: object
      additionalProperties: false
      required: [kind, title, description]
      properties:
        kind:
          $ref: "#/components/schemas/WorldEntryKind"
        title:
          type: string
          description: 앞뒤 공백 제거 후 비어 있지 않아야 하는 새 세계관 항목 제목
        description:
          type: string
          description: 앞뒤 공백 제거 후 비어 있지 않아야 하는 새 세계관 항목 설명
    SaveWorldEntriesRequest:
      type: object
      additionalProperties: false
      required: [expectedRevision, updates, additions]
      properties:
        expectedRevision:
          type: integer
          minimum: 1
          description: >-
            편집을 시작할 때 조회한 Story Bible 리비전. 저장 시 현재 storyBibleRevision과 정확히 일치해야 합니다.
        updates:
          type: array
          description: >-
            기존 식별자를 유지하며 완전한 kind, title, description 값으로 수정할 항목. 생략된 기존 항목은 유지됩니다.
          items:
            $ref: "#/components/schemas/WorldEntryUpdate"
        additions:
          type: array
          description: >-
            서버가 프로젝트 고유 식별자를 생성해 기존 목록 뒤에 추가할 항목. updates와 동시에 비어 있으면 422입니다.
          items:
            $ref: "#/components/schemas/WorldEntryAddition"
    Scene:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - chapterNumber
        - content
        - relatedCharacterIds
        - relatedWorldEntryIds
      properties:
        id:
          $ref: "#/components/schemas/SceneId"
        title:
          type: string
        chapterNumber:
          type: integer
          minimum: 0
        content:
          type: string
        relatedCharacterIds:
          type: array
          items:
            $ref: "#/components/schemas/CharacterId"
        relatedWorldEntryIds:
          type: array
          items:
            $ref: "#/components/schemas/WorldEntryId"
    Manuscript:
      type: object
      additionalProperties: false
      required: [id, projectId, scenes, activeSceneId]
      properties:
        id:
          $ref: "#/components/schemas/ManuscriptId"
        projectId:
          $ref: "#/components/schemas/ProjectId"
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/Scene"
        activeSceneId:
          $ref: "#/components/schemas/SceneId"
    ProjectWorkspace:
      type: object
      additionalProperties: false
      required: [project, concept, storyBible, manuscript, manuscriptRevision]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        concept:
          $ref: "#/components/schemas/StoryConcept"
        storyBible:
          $ref: "#/components/schemas/StoryBible"
        manuscript:
          $ref: "#/components/schemas/Manuscript"
        manuscriptRevision:
          type: integer
          minimum: 1
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [title, logline, tropeId, protagonistNames]
      properties:
        title:
          type: string
        logline:
          type: string
        tropeId:
          $ref: "#/components/schemas/TropeId"
        protagonistNames:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
    ProjectListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
    SaveManuscriptRequest:
      type: object
      additionalProperties: false
      required: [manuscript, expectedRevision]
      properties:
        manuscript:
          $ref: "#/components/schemas/Manuscript"
        expectedRevision:
          type: integer
          minimum: 1
    SavedProjectActivity:
      type: object
      additionalProperties: false
      required: [projectId, updatedAt]
      properties:
        projectId:
          $ref: "#/components/schemas/ProjectId"
        updatedAt:
          $ref: "#/components/schemas/UtcDateTime"
    SaveManuscriptResponse:
      type: object
      additionalProperties: false
      required: [manuscript, manuscriptRevision, projectActivity]
      properties:
        manuscript:
          $ref: "#/components/schemas/Manuscript"
        manuscriptRevision:
          type: integer
          minimum: 1
        projectActivity:
          $ref: "#/components/schemas/SavedProjectActivity"
    SceneDiffKind:
      type: string
      enum: [unchanged, local-only, server-only]
      description: 정렬된 줄이 두 초안에서 유지되었는지 또는 한쪽에만 있는지 나타내는 분류
    SceneDiffRow:
      type: object
      additionalProperties: false
      required:
        - kind
        - localLineNumber
        - localText
        - serverLineNumber
        - serverText
      properties:
        kind:
          $ref: "#/components/schemas/SceneDiffKind"
        localLineNumber:
          type: [integer, "null"]
          minimum: 1
        localText:
          type: [string, "null"]
        serverLineNumber:
          type: [integer, "null"]
          minimum: 1
        serverText:
          type: [string, "null"]
    CompareManuscriptSceneRequest:
      type: object
      additionalProperties: false
      required: [sceneId, localContent]
      properties:
        sceneId:
          $ref: "#/components/schemas/SceneId"
        localContent:
          type: string
          description: 비교할 로컬 장면 초안의 전체 본문
    CompareManuscriptSceneResponse:
      type: object
      additionalProperties: false
      required:
        - sceneId
        - serverRevision
        - localContent
        - serverContent
        - serverManuscript
        - rows
      properties:
        sceneId:
          $ref: "#/components/schemas/SceneId"
        serverRevision:
          type: integer
          minimum: 1
        localContent:
          type: string
        serverContent:
          type: string
        serverManuscript:
          $ref: "#/components/schemas/Manuscript"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/SceneDiffRow"
    UtcDateTime:
      type: string
      format: date-time
      pattern: Z$
      description: RFC 3339 형식이며 대문자 Z로 끝나는 UTC 일시
      examples: ["2026-07-14T03:00:00.000Z"]
    ApiErrorCode:
      type: string
      enum:
        - MALFORMED_REQUEST
        - PROJECT_NOT_FOUND
        - MANUSCRIPT_NOT_FOUND
        - SCENE_NOT_FOUND
        - INVALID_SCENE_REFERENCE
        - MANUSCRIPT_REVISION_CONFLICT
        - STORY_BIBLE_NOT_FOUND
        - STORY_BIBLE_REVISION_CONFLICT
        - INVALID_WORLD_ENTRIES
        - INVALID_TITLE
        - INVALID_TROPE
        - INVALID_PROTAGONISTS
        - INVALID_MANUSCRIPT
        - INTERNAL_ERROR
    FieldError:
      type: object
      additionalProperties: false
      required: [path, message]
      properties:
        path:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
    ApiError:
      type: object
      additionalProperties: false
      required: [code, message, fieldErrors]
      properties:
        code:
          $ref: "#/components/schemas/ApiErrorCode"
        message:
          type: string
          minLength: 1
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
