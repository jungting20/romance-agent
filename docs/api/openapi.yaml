          type: string
        chapterNumber:
          type: integer
          minimum: 0
        content:
          type: string
        relatedCharacterIds:
          type: array
          items:
            $ref: "#/components/schemas/CharacterId"
        relatedWorldEntryIds:
          type: array
          items:
            $ref: "#/components/schemas/WorldEntryId"
    Manuscript:
      type: object
      additionalProperties: false
