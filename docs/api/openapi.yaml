      additionalProperties: false
      required: [projectId, updatedAt]
      properties:
        projectId:
          $ref: "#/components/schemas/ProjectId"
        updatedAt:
          $ref: "#/components/schemas/UtcDateTime"
    SaveManuscriptResponse:
      type: object
      additionalProperties: false
      required: [manuscript, manuscriptRevision, projectActivity]
      properties:
        manuscript:
          $ref: "#/components/schemas/Manuscript"
        manuscriptRevision:
          type: integer
          minimum: 1
        projectActivity:
          $ref: "#/components/schemas/SavedProjectActivity"
    SceneDiffKind:
      type: string
      enum: [unchanged, local-only, server-only]
      description: 정렬된 줄이 두 초안에서 유지되었는지 또는 한쪽에만 있는지 나타내는 분류
    SceneDiffRow:
      type: object
      additionalProperties: false
      required:
        - kind
        - localLineNumber
        - localText
        - serverLineNumber
        - serverText
      properties:
        kind:
          $ref: "#/components/schemas/SceneDiffKind"
        localLineNumber:
          type: [integer, "null"]
          minimum: 1
        localText:
          type: [string, "null"]
        serverLineNumber:
          type: [integer, "null"]
          minimum: 1
        serverText:
          type: [string, "null"]
    CompareManuscriptSceneRequest:
      type: object
      additionalProperties: false
      required: [sceneId, localContent]
      properties:
        sceneId:
          $ref: "#/components/schemas/SceneId"
        localContent:
          type: string
          description: 비교할 로컬 장면 초안의 전체 본문
    CompareManuscriptSceneResponse:
      type: object
      additionalProperties: false
      required:
        - sceneId
        - serverRevision
        - localContent
        - serverContent
        - serverManuscript
        - rows
      properties:
        sceneId:
          $ref: "#/components/schemas/SceneId"
        serverRevision:
          type: integer
          minimum: 1
        localContent:
          type: string
        serverContent:
          type: string
        serverManuscript:
          $ref: "#/components/schemas/Manuscript"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/SceneDiffRow"
    UtcDateTime:
      type: string
      format: date-time
      pattern: Z$
      description: RFC 3339 형식이며 대문자 Z로 끝나는 UTC 일시
      examples: ["2026-07-14T03:00:00.000Z"]
    ApiErrorCode:
      type: string
      enum:
        - MALFORMED_REQUEST
        - PROJECT_NOT_FOUND
        - MANUSCRIPT_NOT_FOUND
        - SCENE_NOT_FOUND
        - INVALID_SCENE_REFERENCE
        - MANUSCRIPT_REVISION_CONFLICT
        - STORY_BIBLE_NOT_FOUND
        - STORY_BIBLE_REVISION_CONFLICT
        - INVALID_WORLD_ENTRIES
        - CHARACTER_NOT_FOUND
        - INVALID_CHARACTER
        - INVALID_TITLE
        - INVALID_TROPE
        - INVALID_PROTAGONISTS
        - INVALID_MANUSCRIPT
        - INTERNAL_ERROR
    FieldError:
      type: object
      additionalProperties: false
      required: [path, message]
      properties:
        path:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
    ApiError:
      type: object
      additionalProperties: false
      required: [code, message, fieldErrors]
      properties:
        code:
          $ref: "#/components/schemas/ApiErrorCode"
        message:
          type: string
          minLength: 1
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
